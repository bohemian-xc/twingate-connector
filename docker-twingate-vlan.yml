version: '3.8'  # Use an appropriate version of Docker Compose

services:
  twingate_connector:  # Define a service named "twingate_connector"
    container_name: ${TG_LABEL_HOSTNAME}
    hostname: ${TG_LABEL_HOSTNAME}
    image: "twingate/connector:1.7"  # Use the "twingate/connector" Docker image with the "latest" tag
    restart: always  # Ensure the container restarts automatically if it exits (e.g., after a crash or system reboot)
    networks:
      vlan10_net:
        ipv4_address: ${VLAN10_IPADDRESS}
    environment:
      # - SSL_CERT_FILE=/etc/ssl/certs/ca-certificates.crt
      # - TWINGATE_API_ENDPOINT=/connector.stock
      - TWINGATE_NETWORK=${TG_NETWORK}
      - TWINGATE_ACCESS_TOKEN=${TG_ACCESS_TOKEN}
      - TWINGATE_REFRESH_TOKEN=${TG_REFRESH_TOKEN}
      - TWINGATE_LABEL_HOSTNAME=${TG_LABEL_HOSTNAME}
      - TWINGATE_LOG_ANALYTICS=v2
      - TWINGATE_LOG_LEVEL=4
    healthcheck:
      test: ["CMD", "connectorctl", "health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  vlan10_net:
    name: vlan10_net
    driver: ipvlan
    driver_opts:
      parent: ${VLAN10_PARENT}
      ipvlan_mode: l2
    ipam:
      config:
        - subnet: ${VLAN10_SUBNET}
          gateway: ${VLAN10_GATEWAY}
